[pytest]
# Backstop per-test wall-clock limit (seconds). The Block E library cross-check
# enforces its own clean 300s timeout on the motifs_randesu child process
# (_ORACLE_TIMEOUT_S) and fails gracefully; this higher pytest-timeout only
# fires if something else hangs. "thread" is used because the slow work is an
# igraph C call the default signal-based method cannot interrupt mid-call.
timeout = 360
timeout_method = thread
