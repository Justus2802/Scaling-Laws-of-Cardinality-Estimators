[pytest]
# No suite-wide wall-clock limit. Only the Block E library cross-check can hang
# (a GIL-holding igraph motifs_randesu C call); it already carries its own clean
# 300s subprocess timeout (_ORACLE_TIMEOUT_S) and a pytest-timeout backstop
# applied via @pytest.mark.timeout on that test class alone — see
# tests/test_signature_block_e_vs_library.py. A global timeout would put an
# arbitrary limit on every fast test for no benefit. The marker is registered
# here so pytest --strict-markers-style warnings stay quiet.
markers =
    timeout: per-test wall-clock backstop (pytest-timeout); scoped, not suite-wide.
